name: PatientPulse Azure Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm install
    
    - name: Run tests
      working-directory: ./backend
      run: npm test
      continue-on-error: true
    
    - name: Build application
      working-directory: ./backend
      run: npm run build
      continue-on-error: true
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'patientpulse-app'
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: './backend'
    
    - name: Configure App Settings
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az webapp config appsettings set --name patientpulse-app --resource-group <YOUR_RESOURCE_GROUP> \
            --settings NODE_ENV=production \
            DB_USER=postgres \
            DB_PASSWORD=${{ secrets.SUPABASE_PASSWORD }} \
            DB_HOST="db.eeubefsvavmguwmapgpi.supabase.co" \
            DB_PORT=5432 \
            DB_NAME=postgres \
            DB_SSL=true
    
    - name: Post deployment verification
      run: |
        echo "Deployment completed successfully"
        echo "Application: patientpulse-app"
        echo "Environment: production"
